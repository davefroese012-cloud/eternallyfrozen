<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prints & Paintings • Eternally Frozen Tattoo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
<!-- SMOOTH BLACK FADE TRANSITION - pure black overlay (cinematic) -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    let overlay = document.getElementById('page-transition');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'page-transition';
      document.body.appendChild(overlay);
    }

    const css = `
    #page-transition {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #000;
      z-index: 99999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 680ms cubic-bezier(0.45, 0.05, 0.55, 0.95);
    }
    #page-transition.active {
      opacity: 1;
      pointer-events: auto;
    }
  `;
    const style = document.createElement('style');
    style.textContent = css;
    document.head.appendChild(style);

    // Fade FROM black on page load
    overlay.classList.add('active');
    setTimeout(() => {
      overlay.classList.remove('active');
    }, 80);

    // Fade TO black on any internal link click
    document.addEventListener('click', function (e) {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href').trim();
      if (!href || href.startsWith('#') || href.startsWith('http') || href.includes('mailto') || href.includes('tel')) return;

      e.preventDefault();
      overlay.classList.add('active');

      setTimeout(() => {
        window.location.href = href;
      }, 680);
    }, true);
  });
</script>
</head>

<body class="prints-page">

  <!-- Header loads here -->

  <section class="min-h-screen pt-24 pb-20 bg-[#0a0005] flex items-center">
    <div class="max-w-4xl mx-auto px-6 text-center">
      <h1 class="text-5xl sm:text-7xl accent mb-8">PRINTS & PAINTINGS</h1>
      <p class="text-xl mb-16">Limited original prints and paintings by Chloe Froese</p>

      <div class="bg-black/70 rounded-3xl p-12 gold-border max-w-md mx-auto">
        <h3 class="text-3xl mb-8">Pietà Original Print – 11×14"</h3>
        <p class="text-4xl mb-10">$85</p>
        <a href="https://www.instagram.com/eternallyfrozen.ttt/" target="_blank"
          class="inline-block px-10 py-6 border-4 border-[#d4af37] text-xl hover:bg-[#d4af37] hover:text-black font-bold">
          INQUIRE VIA INSTAGRAM
        </a>
      </div>
    </div>
  </section>

  <!-- Footer loads here -->

  <script>
    fetch('header.html')
      .then(response => response.text())
      .then(data => document.body.insertAdjacentHTML('afterbegin', data));
    fetch('footer.html')
      .then(response => response.text())
      .then(data => document.body.insertAdjacentHTML('beforeend', data));
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prints & Paintings • Eternally Frozen Tattoo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
<!-- SMOOTH BLACK FADE TRANSITION - pure black overlay (cinematic) -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const overlay = document.createElement('div');
    overlay.id = 'page-transition';
    document.body.appendChild(overlay);

    const css = `
    #page-transition {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 99999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 720ms cubic-bezier(0.45, 0.05, 0.55, 0.95);
      will-change: opacity;
    }
    #page-transition.active {
      opacity: 1;
      pointer-events: auto;
    }
  `;
    document.head.appendChild(Object.assign(document.createElement('style'), { textContent: css }));

    // Start black
    overlay.classList.add('active');

    // Wait for header + footer to load, THEN fade in (no flash)
    Promise.all([
      fetch('header.html').then(r => r.text()).then(h => document.body.insertAdjacentHTML('afterbegin', h)),
      fetch('footer.html').then(r => r.text()).then(f => document.body.insertAdjacentHTML('beforeend', f))
    ]).then(() => {
      setTimeout(() => overlay.classList.remove('active'), 180);
    });

    // Fade to black on internal link clicks
    document.addEventListener('click', e => {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href').trim();
      if (!href || href.startsWith('#') || href.startsWith('http') || href.includes('mailto') || href.includes('tel')) return;

      e.preventDefault();
      overlay.classList.add('active');
      setTimeout(() => window.location.href = href, 720);
    }, true);
  });
</script>
</head>

<body class="prints-page">

  <!-- Header loads here -->

  <section class="min-h-screen pt-24 pb-20 bg-[#0a0005] flex items-center">
    <div class="max-w-4xl mx-auto px-6 text-center">
      <h1 class="text-5xl sm:text-7xl accent mb-8">PRINTS & PAINTINGS</h1>
      <p class="text-xl mb-16">Limited original prints and paintings by Chloe Froese</p>

      <div class="bg-black/70 rounded-3xl p-12 gold-border max-w-md mx-auto">
        <h3 class="text-3xl mb-8">Pietà Original Print – 11×14"</h3>
        <p class="text-4xl mb-10">$85</p>
        <a href="https://www.instagram.com/eternallyfrozen.ttt/" target="_blank"
          class="inline-block px-10 py-6 border-4 border-[#d4af37] text-xl hover:bg-[#d4af37] hover:text-black font-bold">
          INQUIRE VIA INSTAGRAM
        </a>
      </div>
    </div>
  </section>

  <!-- Footer loads here -->

  <script>
    fetch('header.html')
      .then(response => response.text())
      .then(data => document.body.insertAdjacentHTML('afterbegin', data));
    fetch('footer.html')
      .then(response => response.text())
      .then(data => document.body.insertAdjacentHTML('beforeend', data));
  </script>
</body>

</html>

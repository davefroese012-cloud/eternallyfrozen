<!-- GLightbox & Strong Fade Transition -->
<script src="https://cdn.jsdelivr.net/npm/glightbox@3/dist/js/glightbox.min.js"></script>
<script>
  // GLightbox
  document.addEventListener('DOMContentLoaded', () => {
    GLightbox({
      selector: '.glightbox',
      touchNavigation: true,
      loop: true,
      closeOnOutsideClick: true,
      zoomable: true
    });
  });

  // Strong fade-to-black (250ms - 25% faster than Atticus)
  function handleNavClick(e) {
    const link = e.target.closest('a[href]');
    if (!link) return;

    const href = link.getAttribute('href');
    if (href && !href.startsWith('#') && !href.startsWith('http') && !href.includes('#')) {
      e.preventDefault();
      document.documentElement.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = href;
      }, 250);
    }
  }

  // Run early and on every click
  document.addEventListener('click', handleNavClick, true);
</script>

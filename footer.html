<!-- GLightbox & FINAL Fade-to-Black Transition -->
<script src="https://cdn.jsdelivr.net/npm/glightbox@3/dist/js/glightbox.min.js"></script>
<script>
  // GLightbox
  document.addEventListener('DOMContentLoaded', () => {
    GLightbox({
      selector: '.glightbox',
      touchNavigation: true,
      loop: true,
      closeOnOutsideClick: true,
      zoomable: true
    });
  });

  // MutationObserver + click handler (catches dynamic nav links)
  function setupFade() {
    const navLinks = document.querySelectorAll('.nav-links a');
    navLinks.forEach(link => {
      link.addEventListener('click', function (e) {
        const href = this.getAttribute('href');
        if (href && !href.startsWith('#') && !href.startsWith('http') && !href.includes('#')) {
          e.preventDefault();
          document.documentElement.classList.add('fade-out');
          setTimeout(() => {
            window.location.href = href;
          }, 250);
        }
      });
    });
  }

  // Run now and watch for header to be inserted
  setupFade();
  const observer = new MutationObserver(setupFade);
  observer.observe(document.body, { childList: true, subtree: true });
</script>

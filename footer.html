<!-- GLightbox -->
<script src="https://cdn.jsdelivr.net/npm/glightbox@3/dist/js/glightbox.min.js"></script>

<script>
  // GLightbox (unchanged)
  document.addEventListener('DOMContentLoaded', () => {
    GLightbox({
      selector: '.glightbox',
      touchNavigation: true,
      loop: true,
      closeOnOutsideClick: true,
      zoomable: true,
      draggable: true,
      keyboardNavigation: true
    });
  });

  // RELIABLE HAMBURGER MENU (works 100% of the time)
  function initHamburger() {
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');

    if (hamburger && navLinks) {
      hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('active');
      });
      console.log('Hamburger menu initialized successfully');
      return true;
    }
    return false;
  }

  // Try immediately, then retry every 100ms for up to 2 seconds (covers async fetch)
  let attempts = 0;
  const maxAttempts = 20;
  const interval = setInterval(() => {
    if (initHamburger() || attempts++ >= maxAttempts) {
      clearInterval(interval);
    }
  }, 100);
</script>

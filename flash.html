<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash • Eternally Frozen Tattoo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0005; color: #fff; font-family: 'Playfair Display', serif; }
    .accent { color: #d4af37; text-shadow: 0 0 20px #d4af37; }
    .gold-border { border: 3px solid #d4af37; box-shadow: 0 0 30px rgba(212,175,55,0.3); }
  </style>
</head>
<body>

  <!-- Header loads here -->

  <!-- FLASH -->
  <section class="min-h-screen pt-24 pb-20 bg-[#0a0005]">
    <div class="max-w-6xl mx-auto px-6">
      <h1 class="text-5xl sm:text-6xl text-center accent mb-16">CURRENT FLASH</h1>
      <p class="text-center text-xl mb-12">Reserve with e-transfer deposit • More added monthly</p>
      
      <div class="grid md:grid-cols-3 gap-10">
        <div class="flash-card bg-zinc-950 rounded-3xl overflow-hidden gold-border">
          <img src="Images/portfolio/57D5DF8B-57DD-4B3B-A4A0-60C065132A0B.webp" class="w-full h-80 object-cover">
          <div class="p-8">
            <h3 class="text-3xl">Ladybug Realism</h3>
            <ul class="mt-6 text-sm space-y-2">
              <li>Small (3×3") – $160</li>
              <li>Medium (5×5") – $260</li>
            </ul>
            <button onclick="alert('Message Chloe on IG @eternallyfrozen.ttt to reserve!')" class="mt-10 w-full py-6 bg-[#4a0e0e] hover:bg-[#d4af37] hover:text-black text-lg font-bold">
              RESERVE THIS FLASH – E-TRANSFER
            </button>
          </div>
        </div>
        <!-- Duplicate the div above for additional flash designs -->
      </div>
    </div>
  </section>

  <!-- Footer loads here -->

  <script>
    fetch('header.html')
      .then(response => response.text())
      .then(data => document.body.insertAdjacentHTML('afterbegin', data));
    fetch('footer.html')
      .then(response => response.text())
      .then(data => document.body.insertAdjacentHTML('beforeend', data));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash • Eternally Frozen Tattoo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="flash-page" style="opacity: 0;">

  <!-- Embedded Header (already in your current file) -->
  <header class="nav-header">
    <div class="nav-container">
      <a href="index.html" class="logo-link">
        <img src="images/logo/rabbit-logo.webp" alt="Eternally Frozen Tattoo" class="nav-logo">
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="flash.html">Flash</a>
        <a href="prints.html">Prints</a>
        <a href="book.html">Book Now</a>
      </nav>
    </div>
  </header>

  <section class="min-h-screen pt-24 pb-20 bg-[#0a0005]">
    <div class="max-w-6xl mx-auto px-6">
      <h1 class="text-5xl sm:text-6xl text-center accent mb-16">CURRENT FLASH</h1>
      <p class="text-center text-xl mb-12">Reserve with e-transfer deposit • More added monthly</p>

      <div class="grid md:grid-cols-3 gap-10">
        <div class="flash-card bg-zinc-950 rounded-3xl overflow-hidden gold-border">
          <img src="images/portfolio/57D5DF8B-57DD-4B3B-A4A0-60C065132A0B.webp" class="w-full h-80 object-cover">
          <div class="p-8">
            <h3 class="text-3xl">Ladybug Realism</h3>
            <ul class="mt-6 text-sm space-y-2">
              <li>Small (3×3") – $160</li>
              <li>Medium (5×5") – $260</li>
            </ul>
            <button onclick="alert('Message Chloe on IG @eternallyfrozen.ttt to reserve!')"
              class="mt-10 w-full py-6 bg-[#4a0e0e] hover:bg-[#d4af37] hover:text-black text-lg font-bold">
              RESERVE THIS FLASH – E-TRANSFER
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- SAFE DIAGNOSTIC FADE SCRIPT (this fixes the black screen) -->
  <script>
    console.log('=== FADE SCRIPT STARTED ===');
    const overlay = document.createElement('div');
    overlay.id = 'page-transition';
    Object.assign(overlay.style, {
      position: 'fixed', inset: '0', background: '#000', zIndex: '99999',
      opacity: '1', pointerEvents: 'none',
      transition: 'opacity 720ms cubic-bezier(0.45, 0.05, 0.55, 0.95)',
      willChange: 'opacity'
    });
    document.body.appendChild(overlay);

    // FORCE REVEAL AFTER 800ms - page can never stay black
    setTimeout(() => {
      console.log('Forcing page reveal (800ms timeout)');
      document.body.classList.add('loaded');
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.remove();
        console.log('Overlay removed - page fully visible');
      }, 850);
    }, 800);

    // Click handler for smooth fade to black on navigation
    document.addEventListener('click', function (e) {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href').trim();
      if (!href || href.startsWith('#') || href.startsWith('http') || href.includes('mailto') || href.includes('tel')) return;

      e.preventDefault();
      overlay.style.opacity = '1';
      setTimeout(() => window.location.href = href, 720);
    }, true);
  </script>
</body>

</html>

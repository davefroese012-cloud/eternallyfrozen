<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash • Eternally Frozen Tattoo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">

  <!-- FADE SCRIPT v6 - BLACK TRANSITION - FIXED March 20 2026 - FULL VERSION -->
  <script>
    document.addEventListener('click', function (e) {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href');
      if (href && !href.startsWith('#') && !href.startsWith('http') && !href.includes('#')) {
        e.preventDefault();
        document.documentElement.classList.add('fade-out');
        setTimeout(() => {
          window.location.href = href;
        }, 125);
      }
    }, true);

    window.addEventListener('load', () => {
      document.documentElement.classList.add('fade-in');
    });
  </script>
</head>

<body class="flash-page">

  <!-- Header loads here -->

  <section class="min-h-screen pt-24 pb-20 bg-[#0a0005]">
    <div class="max-w-6xl mx-auto px-6">
      <h1 class="text-5xl sm:text-6xl text-center accent mb-16">CURRENT FLASH</h1>
      <p class="text-center text-xl mb-12">Reserve with e-transfer deposit • More added monthly</p>

      <div class="grid md:grid-cols-3 gap-10">
        <div class="flash-card bg-zinc-950 rounded-3xl overflow-hidden gold-border">
          <img src="images/portfolio/57D5DF8B-57DD-4B3B-A4A0-60C065132A0B.webp" class="w-full h-80 object-cover">
          <div class="p-8">
            <h3 class="text-3xl">Ladybug Realism</h3>
            <ul class="mt-6 text-sm space-y-2">
              <li>Small (3×3") – $160</li>
              <li>Medium (5×5") – $260</li>
            </ul>
            <button onclick="alert('Message Chloe on IG @eternallyfrozen.ttt to reserve!')"
              class="mt-10 w-full py-6 bg-[#4a0e0e] hover:bg-[#d4af37] hover:text-black text-lg font-bold">
              RESERVE THIS FLASH – E-TRANSFER
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer loads here -->

  <script>
    fetch('header.html')
      .then(response => response.text())
      .then(data => document.body.insertAdjacentHTML('afterbegin', data));
    fetch('footer.html')
      .then(response => response.text())
      .then(data => document.body.insertAdjacentHTML('beforeend', data));
  </script>
</body>

</html>

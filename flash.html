<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash • Eternally Frozen Tattoo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">

<!-- SMOOTH BLACK FADE TRANSITION - pure black overlay (cinematic) -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const overlay = document.createElement('div');
    overlay.id = 'page-transition';
    document.body.appendChild(overlay);

    const css = `
    #page-transition {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 99999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 720ms cubic-bezier(0.45, 0.05, 0.55, 0.95);
      will-change: opacity;
    }
    #page-transition.active {
      opacity: 1;
      pointer-events: auto;
    }
  `;
    document.head.appendChild(Object.assign(document.createElement('style'), { textContent: css }));

    // Start black
    overlay.classList.add('active');

    // Wait for header + footer to load, THEN fade in (no flash)
    Promise.all([
      fetch('header.html').then(r => r.text()).then(h => document.body.insertAdjacentHTML('afterbegin', h)),
      fetch('footer.html').then(r => r.text()).then(f => document.body.insertAdjacentHTML('beforeend', f))
    ]).then(() => {
      setTimeout(() => overlay.classList.remove('active'), 180);
    });

    // Fade to black on internal link clicks
    document.addEventListener('click', e => {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href').trim();
      if (!href || href.startsWith('#') || href.startsWith('http') || href.includes('mailto') || href.includes('tel')) return;

      e.preventDefault();
      overlay.classList.add('active');
      setTimeout(() => window.location.href = href, 720);
    }, true);
  });
</script>
</head>

<body class="flash-page">

  <!-- Embedded Header (no more fetch - this fixes the fade permanently) -->
  <header class="nav-header">
    <div class="nav-container">
      <a href="index.html" class="logo-link">

      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="flash.html">Flash</a>
        <a href="prints.html">Prints</a>
        <a href="book.html">Book Now</a>
      </nav>
    </div>
  </header>

  <section class="min-h-screen pt-24 pb-20 bg-[#0a0005]">
    <div class="max-w-6xl mx-auto px-6">
      <h1 class="text-5xl sm:text-6xl text-center accent mb-16">CURRENT FLASH</h1>
      <p class="text-center text-xl mb-12">Reserve with e-transfer deposit • More added monthly</p>

      <div class="grid md:grid-cols-3 gap-10">
        <div class="flash-card bg-zinc-950 rounded-3xl overflow-hidden gold-border">
          <img src="images/portfolio/57D5DF8B-57DD-4B3B-A4A0-60C065132A0B.webp" class="w-full h-80 object-cover">
          <div class="p-8">
            <h3 class="text-3xl">Ladybug Realism</h3>
            <ul class="mt-6 text-sm space-y-2">
              <li>Small (3×3") – $160</li>
              <li>Medium (5×5") – $260</li>
            </ul>
            <button onclick="alert('Message Chloe on IG @eternallyfrozen.ttt to reserve!')"
              class="mt-10 w-full py-6 bg-[#4a0e0e] hover:bg-[#d4af37] hover:text-black text-lg font-bold">
              RESERVE THIS FLASH – E-TRANSFER
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer loads here -->

  <script>
    fetch('footer.html')
      .then(response => response.text())
      .then(data => document.body.insertAdjacentHTML('beforeend', data));
  </script>
</body>

</html>

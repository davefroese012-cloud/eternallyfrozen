<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio • Eternally Frozen Tattoo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox@3/dist/css/glightbox.min.css">
</head>

<body class="portfolio-page" style="opacity: 0;">

  <section class="min-h-screen pt-24 pb-20 bg-[#0a0005]">
    <div class="max-w-7xl mx-auto px-6">
      <div class="portfolio-grid grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
        <!-- All your portfolio images here (same as before) -->
        <a href="images/portfolio/2CEAC040-C4DC-4D58-8560-055B926B8455.webp" class="glightbox"><img
            src="images/portfolio/2CEAC040-C4DC-4D58-8560-055B926B8455.webp" alt=""
            class="w-full rounded-xl gold-border"></a>
        <a href="images/portfolio/2D40FBC6-7DE1-4220-9A91-90CFC5C00007.webp" class="glightbox"><img
            src="images/portfolio/2D40FBC6-7DE1-4220-9A91-90CFC5C00007.webp" alt=""
            class="w-full rounded-xl gold-border"></a>
        <!-- ... add the rest of your images exactly as they were ... -->
      </div>
    </div>
  </section>

  <!-- SAFE DIAGNOSTIC FADE SCRIPT -->
  <script>
    console.log('=== FADE SCRIPT STARTED ===');
    const overlay = document.createElement('div');
    overlay.id = 'page-transition';
    Object.assign(overlay.style, {
      position: 'fixed', inset: '0', background: '#000', zIndex: '99999',
      opacity: '1', pointerEvents: 'none',
      transition: 'opacity 720ms cubic-bezier(0.45, 0.05, 0.55, 0.95)',
      willChange: 'opacity'
    });
    document.body.appendChild(overlay);

    setTimeout(() => {
      console.log('Forcing page reveal (800ms timeout)');
      document.body.classList.add('loaded');
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.remove();
        console.log('Overlay removed - page fully visible');
      }, 850);
    }, 800);

    Promise.all([
      fetch('header.html').then(r => r.text()).then(data => { document.body.insertAdjacentHTML('afterbegin', data); console.log('Header loaded'); }),
      fetch('footer.html').then(r => r.text()).then(data => { document.body.insertAdjacentHTML('beforeend', data); console.log('Footer loaded'); })
    ]).catch(err => console.error('Fetch error:', err));

    document.addEventListener('click', function (e) {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href').trim();
      if (!href || href.startsWith('#') || href.startsWith('http') || href.includes('mailto') || href.includes('tel')) return;

      e.preventDefault();
      overlay.style.opacity = '1';
      setTimeout(() => window.location.href = href, 720);
    }, true);
  </script>
</body>

</html>

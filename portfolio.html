<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio • Eternally Frozen Tattoo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
</head>

<body>

  <!-- Header loads here -->

  <!-- PORTFOLIO -->
  <section class="min-h-screen pt-24 pb-20 bg-[#0a0005]">
    <div class="max-w-7xl mx-auto px-6">
      <h1 class="text-5xl sm:text-6xl text-center accent mb-16">PORTFOLIO</h1>

      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
        <a href="Images/portfolio/IMG_4119.webp" data-lightbox="portfolio" data-title="Renaissance portrait tattoo">
          <img src="Images/portfolio/IMG_4119.webp" alt="Renaissance portrait tattoo"
            class="w-full rounded-xl gold-border">
        </a>
        <a href="Images/portfolio/IMG_4121.webp" data-lightbox="portfolio" data-title="Gothic church tattoo">
          <img src="Images/portfolio/IMG_4121.webp" alt="Gothic church tattoo" class="w-full rounded-xl gold-border">
        </a>
        <a href="Images/portfolio/57D5DF8B-57DD-4B3B-A4A0-60C065132A0B.webp" data-lightbox="portfolio"
          data-title="Ladybug color realism">
          <img src="Images/portfolio/57D5DF8B-57DD-4B3B-A4A0-60C065132A0B.webp" alt="Ladybug color realism"
            class="w-full rounded-xl gold-border">
        </a>
        <!-- Add the rest of your images here using the same pattern -->
        <!-- Example: -->
        <!-- <a href="Images/portfolio/IMG_XXXX.webp" data-lightbox="portfolio" data-title="Description">
          <img src="Images/portfolio/IMG_XXXX.webp" alt="Description" class="w-full rounded-xl gold-border">
        </a> -->
      </div>
    </div>
  </section>

  <!-- Footer loads here -->

  <script>
    fetch('header.html')
      .then(response => response.text())
      .then(data => document.body.insertAdjacentHTML('afterbegin', data));
    fetch('footer.html')
      .then(response => response.text())
      .then(data => document.body.insertAdjacentHTML('beforeend', data));
  </script>
</body>

</html>

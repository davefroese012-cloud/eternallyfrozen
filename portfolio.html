<!-- ADJUSTABLE FADE SCRIPT - change these two numbers only -->
<script>
  // === TIMINGS YOU CAN CHANGE ===
  const FADE_DURATION = 800;      // ← Fade animation speed (ms). 500 = fast, 800 = slow & cinematic
  const BLACK_HOLD_ON_LOAD = 380; // ← How long the black screen stays before fading IN on a new page

  // (No need to touch anything below here)
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;inset:0;background:#000;z-index:99999;opacity:1;transition:opacity ${FADE_DURATION}ms cubic-bezier(0.45,0.05,0.55,0.95);`;
  document.body.appendChild(overlay);

  // Background load header/footer
  fetch('header.html').then(r => r.text()).then(h => document.body.insertAdjacentHTML('afterbegin', h));
  fetch('footer.html').then(r => r.text()).then(f => document.body.insertAdjacentHTML('beforeend', f));

  // Fade FROM black on page load
  setTimeout(() => {
    overlay.style.opacity = '0';
    setTimeout(() => overlay.remove(), FADE_DURATION + 50);
  }, BLACK_HOLD_ON_LOAD);

  // Fade TO black on any internal link click
  document.addEventListener('click', e => {
    const link = e.target.closest('a[href]');
    if (!link) return;
    const href = link.getAttribute('href').trim();
    if (!href || href.startsWith('#') || href.startsWith('http') || href.includes('mailto') || href.includes('tel')) return;

    e.preventDefault();
    overlay.style.opacity = '1';
    setTimeout(() => location.href = href, FADE_DURATION);
  });
</script>
